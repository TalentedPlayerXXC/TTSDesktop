<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="50%" stop-color="#15082e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    
    <!-- 声波条渐变 -->
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0d7ff"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- 外圈光晕 -->
  <rect width="1024" height="1024" rx="200" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.15"/>
  <rect x="20" y="20" width="984" height="984" rx="188" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.08"/>

  <!-- 装饰粒子 -->
  <circle cx="240" cy="760" r="6" fill="#7c3aed" opacity="0.4"/>
  <circle cx="820" cy="280" r="4" fill="#a78bfa" opacity="0.3"/>
  <circle cx="780" cy="780" r="3" fill="#c4b5fd" opacity="0.25"/>
  <circle cx="280" cy="220" r="5" fill="#7c3aed" opacity="0.35"/>

  <!-- 声波条底部光晕 -->
  <ellipse cx="512" cy="600" rx="200" ry="30" fill="#7c3aed" opacity="0.12" filter="url(#softGlow)"/>

  <!-- 声波条 -->
  <g filter="url(#glow)">
    <!-- 条 1 - 最矮 -->
    <rect x="320" y="440" width="36" height="180" rx="18" fill="url(#bar1)"/>
    <!-- 条 2 -->
    <rect x="380" y="360" width="36" height="260" rx="18" fill="url(#bar2)"/>
    <!-- 条 3 - 最高 -->
    <rect x="440" y="300" width="36" height="320" rx="18" fill="url(#bar3)"/>
    <!-- 条 4 -->
    <rect x="500" y="340" width="36" height="280" rx="18" fill="url(#bar2)"/>
    <!-- 条 5 -->
    <rect x="560" y="420" width="36" height="200" rx="18" fill="url(#bar1)"/>
    <!-- 条 6 -->
    <rect x="620" y="460" width="36" height="160" rx="18" fill="url(#bar1)"/>
  </g>

  <!-- 声波条白色高光 -->
  <rect x="322" y="440" width="10" height="120" rx="5" fill="white" opacity="0.15"/>
  <rect x="382" y="360" width="10" height="180" rx="5" fill="white" opacity="0.15"/>
  <rect x="442" y="300" width="10" height="240" rx="5" fill="white" opacity="0.2"/>
  <rect x="502" y="340" width="10" height="200" rx="5" fill="white" opacity="0.15"/>
  <rect x="562" y="420" width="10" height="140" rx="5" fill="white" opacity="0.12"/>
  <rect x="622" y="460" width="10" height="100" rx="5" fill="white" opacity="0.1"/>
</svg>
